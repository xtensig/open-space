# Съедобная монтировка
- type: entity
  abstract: true
  parent: FoodBase
  id: CrowbarWTF
  name: Монтировка
  description: Выглядит словно этим можно взломать Пентагон.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/crowbar_drop.ogg
  - type: Tag
    tags:
    - Crowbar
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud
  - type: Tool
    qualities:
      - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: ToolTileCompatible
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: StaticPrice
    price: 22
  - type: Prying
  - type: Sprite
    sprite: Objects/Tools/crowbar.rsi
  - type: Clothing
    sprite: Objects/Tools/crowbar.rsi
    quickEquip: false
    slots:
    - Belt
  - type: Item
    sprite: Objects/Tools/crowbar.rsi
    size: Small

- type: entity
  parent: CrowbarWTF
  id: CrowbarWTF1
  components:
  - type: Sprite
    state: icon
  - type: Item
    storedSprite:
      sprite: Objects/Tools/crowbar.rsi
      state: storage